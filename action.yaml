# https://docs.github.com/en/actions/sharing-automations/creating-actions/creating-a-composite-action
name: "AI Issue Triage"
description: "AI-powered issue triage. Detects duplicates, scores relevance, analyzes feasibility, auto-labels, posts sticky summary."
author: "qte77"
branding:
  icon: "tag"
  color: "purple"
inputs:
  GH_TOKEN:
    description: "GitHub token for gh CLI."
    required: true
  AI_TOKEN:
    description: "Token for the LLM backend. For GitHub Models (default), the caller workflow's github.token works when permissions: models: read is set. For Anthropic / OpenAI-compatible backends, pass the provider API key."
    default: ${{ github.token }}
  MODEL:
    description: "LLM model for GitHub Models API."
    default: "openai/gpt-4.1"
  ANTHROPIC_API_KEY:
    description: "Anthropic API key (alternative LLM backend)."
    default: ""
  OPENAI_API_BASE:
    description: "Base URL for an OpenAI-compatible Chat Completions endpoint (Mistral, Ollama, vLLM, ...). When set, takes precedence over Anthropic and GitHub Models. AI_TOKEN is sent as Bearer; MODEL selects the model."
    default: ""
  MAX_DUPLICATES:
    description: "Max duplicate candidates to check."
    default: "10"
  SIMILARITY_THRESHOLD:
    description: "Fuzzy match threshold 0-1."
    default: "0.6"
runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        fetch-depth: 1
        token: ${{ inputs.GH_TOKEN }}

    - name: Setup uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      with:
        enable-cache: true

    - name: Run issue triage
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.GH_TOKEN }}
        AI_TOKEN: ${{ inputs.AI_TOKEN }}
        MODEL: ${{ inputs.MODEL }}
        ANTHROPIC_API_KEY: ${{ inputs.ANTHROPIC_API_KEY }}
        OPENAI_API_BASE: ${{ inputs.OPENAI_API_BASE }}
        MAX_DUPLICATES: ${{ inputs.MAX_DUPLICATES }}
        SIMILARITY_THRESHOLD: ${{ inputs.SIMILARITY_THRESHOLD }}
        PYTHONPATH: ${{ github.action_path }}/src
        UV_PROJECT_ENVIRONMENT: ${{ runner.temp }}/.venv
      run: |
        uv sync --frozen --no-dev --project "${{ github.action_path }}"
        uv run --project "${{ github.action_path }}" python "${{ github.action_path }}/src/app.py"
